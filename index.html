



<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>46 jours</title>
<style>
  :root{
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2c2620;
    --ink-soft: #6b6258;
    --accent: #c8654a;
    --accent-soft: #f0ddd6;
    --line: rgba(44,38,32,0.12);
    --locked: #ece6dc;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    padding: 24px 16px 80px;
  }
  .wrap{ width:100%; max-width: 480px; }

  @media (min-width: 700px){
    body{ background: var(--locked); padding: 40px 16px; }
    .wrap{
      background: var(--bg);
      border-radius: 32px;
      padding: 32px 20px 60px;
      box-shadow: 0 20px 60px rgba(44,38,32,0.15), 0 0 0 1px var(--line);
      min-height: 80vh;
    }
  }

  /* ---------- LOCK SCREEN ---------- */
  #lock-screen{
    min-height: 80vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    width:100%;
  }
  .lock-icon{
    width:56px; height:56px; border-radius:50%;
    background: var(--accent-soft);
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 20px;
  }
  .lock-icon svg{ width:24px; height:24px; stroke: var(--accent); }
  #lock-screen h1{
    font-family: var(--serif);
    font-weight: 400;
    font-size: 26px;
    margin-bottom: 10px;
  }
  #lock-screen p{
    color: var(--ink-soft);
    font-size: 14px;
    line-height:1.6;
    max-width: 320px;
    margin-bottom: 28px;
  }
  #pwd-form{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    width:100%; max-width: 260px;
  }
  #pwd-input{
    width:100%;
    text-align:center;
    font-size: 20px;
    letter-spacing: 4px;
    padding: 14px 10px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-family: var(--sans);
  }
  #pwd-input:focus{ outline:none; border-color: var(--accent); }
  #pwd-submit{
    width:100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    cursor:pointer;
  }
  #pwd-submit:active{ transform: scale(0.98); }
  #pwd-error{
    color: var(--accent);
    font-size: 13px;
    min-height: 18px;
  }

  /* ---------- MAIN APP ---------- */
  #app{ display:none; width:100%; }
  #app.visible{ display:block; }

  header{ text-align:center; margin-bottom: 28px; }
  .eyebrow{
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  h1.title{
    font-family: var(--serif);
    font-weight: 400;
    font-size: 32px;
  }

  .progress-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .progress-bar{
    height: 6px;
    background: var(--locked);
    border-radius: 4px;
    overflow:hidden;
    margin-bottom: 10px;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    border-radius:4px;
    transition: width 0.6s ease;
  }
  .progress-text{
    text-align:center;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .progress-text b{ color: var(--ink); font-weight: 600; }

  .grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
    margin-bottom: 28px;
  }
  .day-cell{
    aspect-ratio: 1;
    border-radius: 10px;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px;
    font-weight: 600;
    cursor:pointer;
    border: 1px solid transparent;
    background: var(--locked);
    color: #a39d90;
    position:relative;
  }
  .day-cell.unlocked{
    background: var(--accent-soft);
    color: var(--accent);
  }
  .day-cell.today{
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .day-cell.locked svg{ width:13px; height:13px; stroke:#a39d90; }
  .day-cell.viewed::after{
    content:'';
    position:absolute; top:4px; right:4px;
    width:5px; height:5px; border-radius:50%;
    background: currentColor;
    opacity:0.5;
  }

  #content-panel{ display:none; }
  #content-panel.visible{
    display:flex;
    position:fixed;
    inset:0;
    z-index: 50;
    align-items:flex-end;
    justify-content:center;
    background: rgba(20,16,12,0);
    backdrop-filter: blur(0px);
    animation: overlay-in 0.4s ease forwards;
  }
  @keyframes overlay-in{
    to{ background: rgba(20,16,12,0.55); backdrop-filter: blur(3px); }
  }

  .content-card{
    background: var(--card);
    border-radius: 26px 26px 0 0;
    padding: 10px 22px 32px;
    max-width: 460px;
    width:100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    animation: card-open 0.55s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 0.05s;
    position: relative;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
  }
  @media (min-width: 480px){
    #content-panel.visible{ align-items:center; }
    .content-card{
      border-radius: 22px;
      transform: scale(0.92) translateY(20px);
    }
    @keyframes card-open{
      to{ transform: scale(1) translateY(0); }
    }
  }
  @keyframes card-open{
    to{ transform: translateY(0); }
  }

  .drag-handle{
    width: 38px; height: 4px;
    background: var(--line);
    border-radius: 4px;
    margin: 10px auto 18px;
  }
  @media (min-width: 480px){ .drag-handle{ display:none; } }

  .close-card{
    position: absolute;
    top:16px; right:16px;
    width:30px; height:30px;
    border-radius:50%;
    background: var(--bg);
    border: 1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1;
    z-index: 5;
  }

  .reveal{
    opacity:0;
    animation: reveal-up 0.55s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes reveal-up{ from{opacity:0; transform:translateY(14px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);} }

  .content-tag{
    display:inline-flex; align-items:center; gap:6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .day-layout{
    display:flex;
    gap: 16px;
    align-items: flex-start;
  }
  .day-text{
    flex: 1.1;
    min-width: 0;
  }
  .day-photos{
    flex: 0.9;
    min-width: 0;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  @media (max-width: 360px){
    .day-layout{ flex-direction:column; }
    .day-photos{ flex-direction:row; }
  }

  .content-photo{
    width:100%;
    aspect-ratio: 3/4;
    border-radius: 12px;
    background: var(--locked);
    display:flex; align-items:center; justify-content:center;
    color: #a39d90;
    font-size: 12px;
    overflow:hidden;
  }
  .content-photo img{ width:100%; height:100%; object-fit:cover; cursor: zoom-in; }

  /* ---------- LIGHTBOX (agrandissement photo) ---------- */
  #lightbox{ display:none; }
  #lightbox.visible{
    display:flex;
    position:fixed; inset:0; z-index: 100;
    align-items:center; justify-content:center;
    padding: 24px;
    background: rgba(10,8,6,0.88);
    animation: overlay-in-lb 0.3s ease forwards;
  }
  @keyframes overlay-in-lb{ from{ opacity:0; } to{ opacity:1; } }
  .lightbox-inner{
    max-width: 520px; width:100%;
    display:flex; flex-direction:column; align-items:center;
    animation: lb-zoom 0.35s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes lb-zoom{ from{ transform: scale(0.92); opacity:0; } to{ transform: scale(1); opacity:1; } }
  .lightbox-inner img{
    width:100%; max-height: 75vh;
    object-fit: contain;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .lightbox-caption{
    color: #f3ede4;
    font-size: 13px;
    font-style: italic;
    text-align:center;
    margin-top: 14px;
    line-height: 1.5;
    max-width: 380px;
  }
  .lightbox-close{
    position: fixed;
    top:20px; right:20px;
    width:38px; height:38px;
    border-radius:50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 20px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index: 101;
  }

  /* ---------- WORD PUZZLE (glisser-deposer) ---------- */
  .puzzle-slots{
    display:flex; flex-wrap:wrap;
    gap: 8px;
    min-height: 46px;
    padding: 14px;
    border: 2px dashed var(--line);
    border-radius: 14px;
    background: var(--accent-soft);
    margin-bottom: 18px;
  }
  .puzzle-slots.empty::before{
    content: "depose les mots ici";
    color: var(--ink-soft);
    font-size: 13px;
    font-style: italic;
  }
  .puzzle-bank{
    display:flex; flex-wrap:wrap;
    gap: 8px;
    min-height: 46px;
  }
  .puzzle-word{
    padding: 9px 14px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 20px;
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink);
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }
  .puzzle-word:active{ cursor: grabbing; }
  .puzzle-word.dragging{
    opacity: 0.4;
  }
  .puzzle-word.drag-ghost{
    position: fixed;
    z-index: 200;
    pointer-events: none;
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    transform: scale(1.05) rotate(-2deg);
  }
  .puzzle-check{
    width:100%;
    margin-top: 6px;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-family: var(--serif);
    font-size: 15px;
    cursor: pointer;
  }
  .puzzle-check:disabled{ opacity: 0.4; cursor:not-allowed; }
  .puzzle-feedback{
    text-align:center;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 12px;
    min-height: 18px;
  }
  .puzzle-feedback.wrong{ color: #b5573f; }
  .puzzle-win-text{
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.6;
    color: var(--ink);
    text-align:center;
    padding: 20px 4px;
  }
  .memory-intro{
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .memory-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .memory-card{
    aspect-ratio: 3/4;
    perspective: 800px;
    cursor:pointer;
  }
  .memory-card-inner{
    position:relative;
    width:100%; height:100%;
    transition: transform 0.5s cubic-bezier(.16,1,.3,1);
    transform-style: preserve-3d;
  }
  .memory-card.flipped .memory-card-inner,
  .memory-card.matched .memory-card-inner{
    transform: rotateY(180deg);
  }
  .memory-card-face{
    position:absolute; inset:0;
    border-radius: 10px;
    backface-visibility: hidden;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .memory-card-front{
    background: var(--accent-soft);
    border: 1.5px solid var(--line);
  }
  .memory-card-front svg{ width:20px; height:20px; stroke: var(--accent); opacity:0.6; }
  .memory-card-back{
    background: var(--locked);
    transform: rotateY(180deg);
  }
  .memory-card-back img{ width:100%; height:100%; object-fit:cover; }
  .memory-card.matched{ opacity: 0.55; }
  .memory-progress{
    text-align:center;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 14px;
  }
  .memory-win-text{
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .memory-recap{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .memory-recap img{
    width:100%;
    aspect-ratio: 3/4;
    object-fit:cover;
    border-radius: 10px;
    cursor: zoom-in;
  }
  .photo-caption{
    font-size: 11px;
    color: var(--ink-soft);
    margin: 6px 0 0;
    font-style: italic;
    line-height: 1.4;
  }
  .content-text{
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
  }
  .content-text.placeholder{ color: var(--ink-soft); font-style: italic; font-family: var(--sans); font-size: 14px; }

  .empty-state{
    text-align:center;
    padding: 30px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }

  /* ---------- RAPPORT OFFICIEL MILITAIRE (jour 5) ---------- */
  .rapport-doc{
    background: #0f1a10;
    border-radius: 10px;
    padding: 18px 16px 20px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 11.5px;
    color: #b8c9a3;
    margin-top: 4px;
    line-height: 1.5;
  }
  .rapport-topbar{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid #2e4a20;
    padding-bottom: 10px;
    margin-bottom: 12px;
  }
  .rapport-logo{
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #5a7a45;
    line-height: 1.8;
  }
  .rapport-logo b{ color: #8ab870; display: block; font-size: 11px; }
  .rapport-stamp{
    border: 2px solid #c0392b;
    color: #c0392b;
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 8px;
    transform: rotate(-8deg);
    line-height: 1.4;
    text-align: center;
    flex-shrink: 0;
  }
  .rapport-ref-block{
    border: 1px solid #2e4a20;
    padding: 8px 10px;
    margin-bottom: 14px;
    background: #091209;
  }
  .rapport-ref-row{
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #5a7a45;
    margin-bottom: 2px;
  }
  .rapport-ref-row span{ color: #8ab870; }
  .rapport-objet{
    color: #d4e8b8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-left: 3px solid #5a7a45;
    padding: 6px 10px;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .rapport-section{ margin-bottom: 14px; }
  .rapport-section-title{
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #5a7a45;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rapport-section-title::before{
    content: '▸';
    color: #8ab870;
  }
  .rapport-section-title::after{
    content: '';
    flex: 1;
    height: 1px;
    background: #2e4a20;
  }
  .rapport-p{
    font-size: 11.5px;
    line-height: 1.7;
    color: #b8c9a3;
    margin-bottom: 6px;
  }
  .rapport-preuve{
    display: inline;
    color: #8ab870;
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    font-weight: 700;
  }
  .rapport-preuve:hover{ color: #d4e8b8; }
  .rapport-table{
    width: 100%;
    border-collapse: collapse;
    font-size: 10.5px;
    margin-bottom: 10px;
    font-family: 'Courier New', Courier, monospace;
  }
  .rapport-table th{
    background: #1a2e12;
    font-weight: 700;
    text-align: left;
    padding: 5px 7px;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #5a7a45;
    border: 1px solid #2e4a20;
  }
  .rapport-table td{
    padding: 5px 7px;
    border: 1px solid #1e3015;
    color: #b8c9a3;
  }
  .rapport-table .num{ text-align: right; font-variant-numeric: tabular-nums; }
  .rapport-table .highlight td{
    background: #1a2e12;
    color: #d4e8b8;
    font-weight: 700;
  }
  .rapport-table .highlight td.num{ color: #8ab870; }
  .rapport-classified{
    background: #091209;
    border: 1px solid #c0392b;
    padding: 12px 14px;
    border-radius: 4px;
    font-family: Georgia, serif;
    font-size: 13px;
    line-height: 1.75;
    color: #d4e8b8;
    font-style: italic;
    margin-top: 4px;
    position: relative;
  }
  .rapport-classified-label{
    font-family: 'Courier New', Courier, monospace;
    font-style: normal;
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c0392b;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rapport-classified-label::after{
    content: '';
    flex: 1;
    height: 1px;
    background: #c0392b;
    opacity: 0.4;
  }
  .rapport-sig{
    margin-top: 14px;
    text-align: right;
    font-size: 10px;
    color: #5a7a45;
    border-top: 1px solid #2e4a20;
    padding-top: 10px;
    font-style: italic;
  }
  .rapport-sig b{ color: #8ab870; font-style: normal; }

  footer{
    text-align:center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- LOCK SCREEN -->
  <div id="lock-screen">
    <div class="lock-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
    </div>
    <h1>46 jours</h1>
    <p>Pour ouvrir, il te faut une date.<br>Une date qu'on n'oublie pas.</p>
    <form id="pwd-form" autocomplete="off">
      <input type="text" id="pwd-input" inputmode="numeric" placeholder="________" maxlength="20">
      <button type="submit" id="pwd-submit">Ouvrir</button>
      <div id="pwd-error"></div>
    </form>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <header>
      <div class="eyebrow">8 juillet — 23 août</div>
      <h1 class="title">46 jours</h1>
    </header>

    <div class="progress-card">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </div>

    <div class="grid" id="day-grid"></div>

    <div id="content-panel">
      <div class="content-card" id="content-card"></div>
    </div>

    <footer>fait avec beaucoup trop d'amour</footer>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lightbox-close" onclick="closeLightbox()">&times;</div>
  <div class="lightbox-inner">
    <img id="lightbox-img" src="" alt="">
    <p id="lightbox-caption" class="lightbox-caption"></p>
  </div>
</div>

<script>
/* ====================================================
   CONFIGURATION — a adapter
   ==================================================== */

// Date du jour 1 (premiere journee sans se voir)
const START_DATE = new Date(2026, 6, 8); // mois = index 0, donc 6 = juillet
const TOTAL_DAYS = 46;

// Mot de passe attendu (chiffres uniquement). A remplacer par la vraie date.
const PASSWORD = "09012026"; // date ou vous avez commence a vous parler

// MODE APERCU — mettre a true pour debloquer tous les jours pendant la construction.
// Repasser a false avant d'envoyer le site a Aziyade !
const PREVIEW_MODE = true;

// Contenu de chaque jour. type: "memory" | "reason" | "quiz" | "challenge" | "photo"
// Laisse vide / placeholder pour l'instant, a remplir ensemble.
const CONTENT = {

function daysSinceStart(){
  const now = new Date();
  const start = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.floor((today - start) / 86400000) + 1;
  return diff;
}

function unlockedCount(){
  if (PREVIEW_MODE) return TOTAL_DAYS;
  const d = daysSinceStart();
  if (d < 1) return 0;
  if (d > TOTAL_DAYS) return TOTAL_DAYS;
  return d;
}

function buildGrid(){
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  const unlocked = unlockedCount();

  for(let i = 1; i <= TOTAL_DAYS; i++){
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.dataset.day = i;

    if(!PREVIEW_MODE && i === unlocked && i <= TOTAL_DAYS && unlocked > 0){
      cell.classList.add('today');
      cell.textContent = i;
    } else if(i <= unlocked){
      cell.classList.add('unlocked');
      cell.textContent = i;
    } else {
      cell.classList.add('locked');
      cell.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>';
    }

    if(i <= unlocked){
      cell.addEventListener('click', () => showDay(i));
    }
    grid.appendChild(cell);
  }

  const fillPct = Math.round((unlocked / TOTAL_DAYS) * 100);
  document.getElementById('progress-fill').style.width = fillPct + '%';

  let progressText;
  if(unlocked === 0){
    progressText = "Pas encore commence";
  } else if(unlocked >= TOTAL_DAYS){
    progressText = "<b>Les 46 jours</b> sont passes. On se retrouve.";
  } else {
    progressText = `<b>${unlocked}</b> jour${unlocked>1?'s':''} debloque${unlocked>1?'s':''}, <b>${TOTAL_DAYS-unlocked}</b> a venir`;
  }
  document.getElementById('progress-text').innerHTML = progressText;
}

function escapeAttr(str){
  return (str || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}

function showDay(day){
  document.querySelectorAll('.day-cell').forEach(c => {
    if(parseInt(c.dataset.day) === day) c.classList.add('viewed');
  });

  const panel = document.getElementById('content-panel');
  const card = document.getElementById('content-card');
  panel.classList.add('visible');
  document.body.style.overflow = 'hidden';

  const data = CONTENT[day];
  let delay = 0;
  const step = 0.12;

  if(!data){
    card.innerHTML = `
      <div class="drag-handle"></div>
      <div class="close-card" onclick="closeDay()">&times;</div>
      <div class="content-tag reveal">Jour ${day}</div>
      <div class="empty-state reveal">Le contenu de ce jour n'a pas encore ete ecrit.</div>
    `;
  } else if(data.type === 'minigame' && data.game === 'memory'){
    card.innerHTML = `
      <div class="drag-handle"></div>
      <div class="close-card" onclick="closeDay()">&times;</div>
      <div class="content-tag reveal" style="animation-delay:0s;">${TAG_LABELS[data.type] || 'Jour ' + day}</div>
      <div class="memory-intro reveal" style="animation-delay:0.1s;">${data.text}</div>
      <div id="memory-root"></div>
    `;
    initMemoryGame(data);
  } else if(data.type === 'wordpuzzle'){
    card.innerHTML = `
      <div class="drag-handle"></div>
      <div class="close-card" onclick="closeDay()">&times;</div>
      <div class="content-tag reveal" style="animation-delay:0s;">${TAG_LABELS[data.type] || 'Jour ' + day}</div>
      <div class="memory-intro reveal" style="animation-delay:0.1s;">${data.text}</div>
      <div id="puzzle-root"></div>
    `;
    initWordPuzzle(data);
  } else if(data.type === 'rapport'){
    card.innerHTML = `
      <div class="drag-handle"></div>
      <div class="close-card" onclick="closeDay()">&times;</div>
      <div class="content-tag reveal" style="animation-delay:0s;">${TAG_LABELS.rapport}</div>
      <div class="reveal" style="animation-delay:0.1s;" id="rapport-root"></div>
    `;
    initRapport(data);
  } else {
    const isPlaceholder = data.text.startsWith('PLACEHOLDER');
    let photosHtml = '';
    if(data.photos && data.photos.length){
      photosHtml = data.photos.map(p => {
        delay += step;
        return `
        <div class="content-photo reveal" style="animation-delay:${delay}s;">
          <img src="${p.src}" alt="" class="lightbox-trigger" data-src="${escapeAttr(p.src)}" data-caption="${escapeAttr(p.caption || '')}">
        </div>
        ${p.caption ? `<p class="photo-caption reveal" style="animation-delay:${delay + 0.05}s;">${p.caption}</p>` : ''}
      `;
      }).join('');
    } else if(data.photo) {
      delay += step;
      photosHtml = `<div class="content-photo reveal" style="animation-delay:${delay}s;"><img src="${data.photo}" alt="" class="lightbox-trigger" data-src="${escapeAttr(data.photo)}" data-caption=""></div>`;
    } else if(data.type === 'memory' || data.type === 'photo') {
      delay += step;
      photosHtml = `<div class="content-photo reveal" style="animation-delay:${delay}s;">photo a venir</div>`;
    }
    delay += step;
    card.innerHTML = `
      <div class="drag-handle"></div>
      <div class="close-card" onclick="closeDay()">&times;</div>
      <div class="content-tag reveal" style="animation-delay:0s;">${TAG_LABELS[data.type] || 'Jour ' + day}</div>
      <div class="day-layout">

        </div>

/* ---------- MEMORY GAME ---------- */
function initMemoryGame(data){
  const pairs = data.pairs;
  let cards = [];
  pairs.forEach((p, i) => {
    cards.push({ pairId: i, src: p.src, caption: p.caption });
    cards.push({ pairId: i, src: p.src, caption: p.caption });
  });
  // shuffle (Fisher-Yates)
  for(let i = cards.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }

  let flipped = [];
  let matchedCount = 0;
  let lock = false;

  const root = document.getElementById('memory-root');
  root.innerHTML = `
    <div class="memory-grid" id="memory-grid"></div>
    <div class="memory-progress" id="memory-progress">0 / ${pairs.length} paires trouvees</div>
  `;
  const grid = document.getElementById('memory-grid');

  cards.forEach((c, idx) => {
    const cardEl = document.createElement('div');
    cardEl.className = 'memory-card';
    cardEl.dataset.idx = idx;
    cardEl.innerHTML = `
      <div class="memory-card-inner">
        <div class="memory-card-face memory-card-front">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 4.5l7.5 7.5-7.5 7.5m-6-15l7.5 7.5-7.5 7.5" transform="rotate(45 12 12)"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 21c-4.97-3.2-9-7.5-9-11.3C3 6.5 5.2 4.5 7.8 4.5c1.8 0 3.3 1 4.2 2.4.9-1.4 2.4-2.4 4.2-2.4C18.8 4.5 21 6.5 21 9.7c0 3.8-4.03 8.1-9 11.3z"/></svg>
        </div>
        <div class="memory-card-face memory-card-back">
          <img src="${c.src}" alt="">
        </div>
      </div>
    `;
    cardEl.addEventListener('click', () => flipCard(idx, cardEl));
    grid.appendChild(cardEl);
  });

  function flipCard(idx, cardEl){
    if(lock) return;
    if(cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
    if(flipped.length === 2) return;

    cardEl.classList.add('flipped');
    flipped.push({ idx, cardEl, pairId: cards[idx].pairId });

    if(flipped.length === 2){
      lock = true;
      const [a, b] = flipped;
      if(a.pairId === b.pairId){
        setTimeout(() => {
          a.cardEl.classList.add('matched');
          b.cardEl.classList.add('matched');
          matchedCount++;
          document.getElementById('memory-progress').textContent = `${matchedCount} / ${pairs.length} paires trouvees`;
          flipped = [];
          lock = false;
          if(matchedCount === pairs.length){
            setTimeout(() => showMemoryWin(data), 500);
          }
        }, 350);
      } else {
        setTimeout(() => {
          a.cardEl.classList.remove('flipped');
          b.cardEl.classList.remove('flipped');
          flipped = [];
          lock = false;
        }, 1100);
      }
    }
  }
}

/* ---------- WORD PUZZLE (glisser-deposer mots dans l'ordre) ---------- */
function initWordPuzzle(data){
  const target = data.words;
  const root = document.getElementById('puzzle-root');

  // melange (different de l'ordre cible)
  let shuffled;
  do {
    shuffled = [...target];
    for(let i = shuffled.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
  } while(shuffled.join(' ') === target.join(' '));

  root.innerHTML = `
    <div class="puzzle-slots empty" id="puzzle-slots"></div>
    <div class="puzzle-bank" id="puzzle-bank"></div>
    <button class="puzzle-check" id="puzzle-check" disabled>Verifier</button>
    <div class="puzzle-feedback" id="puzzle-feedback"></div>
  `;

  const slotsEl = document.getElementById('puzzle-slots');
  const bankEl = document.getElementById('puzzle-bank');
  const checkBtn = document.getElementById('puzzle-check');
  const feedbackEl = document.getElementById('puzzle-feedback');

  shuffled.forEach((word, i) => {
    const el = document.createElement('div');
    el.className = 'puzzle-word';
    el.textContent = word;
    el.dataset.word = word;
    el.dataset.uid = 'w' + i;
    bankEl.appendChild(el);
    makeDraggable(el);
  });

  function updateState(){
    slotsEl.classList.toggle('empty', slotsEl.children.length === 0);
    checkBtn.disabled = bankEl.children.length !== 0;
  }
  updateState();

  function makeDraggable(el){
    let dragging = false;
    let ghost = null;
    let startX = 0, startY = 0;

    function getDropTarget(x, y){
      el.style.pointerEvents = 'none';
      const under = document.elementFromPoint(x, y);
      el.style.pointerEvents = '';
      if(!under) return null;
      return under.closest('.puzzle-slots, .puzzle-bank');
    }

    function onMove(clientX, clientY){
      if(!dragging) return;
      ghost.style.left = (clientX - ghost.offsetWidth / 2) + 'px';
      ghost.style.top = (clientY - ghost.offsetHeight / 2) + 'px';
    }

    function onEnd(clientX, clientY){
      if(!dragging) return;
      dragging = false;
      el.classList.remove('dragging');
      ghost.remove();
      ghost = null;

      const dropZone = getDropTarget(clientX, clientY);
      if(dropZone){
        dropZone.appendChild(el);
      }
      feedbackEl.textContent = '';
      feedbackEl.classList.remove('wrong');
      updateState();

      document.removeEventListener('mousemove', mouseMoveHandler);
      document.removeEventListener('mouseup', mouseUpHandler);
      document.removeEventListener('touchmove', touchMoveHandler);
      document.removeEventListener('touchend', touchEndHandler);
    }

    function mouseMoveHandler(e){ onMove(e.clientX, e.clientY); }
    function mouseUpHandler(e){ onEnd(e.clientX, e.clientY); }
    function touchMoveHandler(e){
      const t = e.touches[0];
      onMove(t.clientX, t.clientY);
      e.preventDefault();
    }
    function touchEndHandler(e){
      const t = e.changedTouches[0];
      onEnd(t.clientX, t.clientY);
    }

    function startDrag(clientX, clientY){
      dragging = true;
      startX = clientX; startY = clientY;
      el.classList.add('dragging');

      ghost = el.cloneNode(true);
      ghost.classList.add('drag-ghost');
      ghost.classList.remove('dragging');
      ghost.style.width = el.offsetWidth + 'px';
      document.body.appendChild(ghost);
      onMove(clientX, clientY);
    }

    el.addEventListener('mousedown', e => {
      e.preventDefault();
      startDrag(e.clientX, e.clientY);
      document.addEventListener('mousemove', mouseMoveHandler);
      document.addEventListener('mouseup', mouseUpHandler);
    });
    el.addEventListener('touchstart', e => {
      const t = e.touches[0];
      startDrag(t.clientX, t.clientY);
      document.addEventListener('touchmove', touchMoveHandler, { passive: false });
      document.addEventListener('touchend', touchEndHandler);
    }, { passive: true });
  }

  checkBtn.addEventListener('click', () => {
    const order = [...slotsEl.children].map(el => el.dataset.word);
    if(order.join(' ') === target.join(' ')){
      setTimeout(() => showPuzzleWin(data), 300);
    } else {
      feedbackEl.textContent = "Pas tout a fait... reessaie.";
      feedbackEl.classList.add('wrong');
    }
  });
}

function closeDay(){
  const panel = document.getElementById('content-panel');
  panel.classList.remove('visible');
  document.body.style.overflow = '';
}

document.addEventListener('click', function(e){
  const panel = document.getElementById('content-panel');
  if(panel.classList.contains('visible') && e.target === panel){
    closeDay();
  }
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    closeLightbox();
    closeDay();
  }
});

document.getElementById('pwd-form').addEventListener('submit', function(e){
  e.preventDefault();
  const val = document.getElementById('pwd-input').value.trim();
  const errorEl = document.getElementById('pwd-error');

  if(val === PASSWORD){
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    buildGrid();
  } else {
    errorEl.textContent = "Ce n'est pas la bonne date...";
    document.getElementById('pwd-input').value = '';
  }
});
</script>

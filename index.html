

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>46 jours</title>
<style>
  :root{
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2c2620;
    --ink-soft: #6b6258;
    --accent: #c8654a;
    --accent-soft: #f0ddd6;
    --line: rgba(44,38,32,0.12);
    --locked: #ece6dc;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    padding: 24px 16px 80px;
  }
  .wrap{ width:100%; max-width: 480px; }

  @media (min-width: 700px){
    body{ background: var(--locked); padding: 40px 16px; }
    .wrap{
      background: var(--bg);
      border-radius: 32px;
      padding: 32px 20px 60px;
      box-shadow: 0 20px 60px rgba(44,38,32,0.15), 0 0 0 1px var(--line);
      min-height: 80vh;
    }
  }

  /* ---------- LOCK SCREEN ---------- */
  #lock-screen{
    min-height: 80vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    width:100%;
  }
  .lock-icon{
    width:56px; height:56px; border-radius:50%;
    background: var(--accent-soft);
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 20px;
  }
  .lock-icon svg{ width:24px; height:24px; stroke: var(--accent); }
  #lock-screen h1{
    font-family: var(--serif);
    font-weight: 400;
    font-size: 26px;
    margin-bottom: 10px;
  }
  #lock-screen p{
    color: var(--ink-soft);
    font-size: 14px;
    line-height:1.6;
    max-width: 320px;
    margin-bottom: 28px;
  }
  #pwd-form{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    width:100%; max-width: 260px;
  }
  #pwd-input{
    width:100%;
    text-align:center;
    font-size: 20px;
    letter-spacing: 4px;
    padding: 14px 10px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-family: var(--sans);
  }
  #pwd-input:focus{ outline:none; border-color: var(--accent); }
  #pwd-submit{
    width:100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    cursor:pointer;
  }
  #pwd-submit:active{ transform: scale(0.98); }
  #pwd-error{
    color: var(--accent);
    font-size: 13px;
    min-height: 18px;
  }

  /* ---------- MAIN APP ---------- */
  #app{ display:none; width:100%; }
  #app.visible{ display:block; }

  header{ text-align:center; margin-bottom: 28px; }
  .eyebrow{
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  h1.title{
    font-family: var(--serif);
    font-weight: 400;
    font-size: 32px;
  }

  .progress-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .progress-bar{
    height: 6px;
    background: var(--locked);
    border-radius: 4px;
    overflow:hidden;
    margin-bottom: 10px;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    border-radius:4px;
    transition: width 0.6s ease;
  }
  .progress-text{
    text-align:center;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .progress-text b{ color: var(--ink); font-weight: 600; }

  .grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
    margin-bottom: 28px;
  }
  .day-cell{
    aspect-ratio: 1;
    border-radius: 10px;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px;
    font-weight: 600;
    cursor:pointer;
    border: 1px solid transparent;
    background: var(--locked);
    color: #a39d90;
    position:relative;
  }
  .day-cell.unlocked{
    background: var(--accent-soft);
    color: var(--accent);
  }
  .day-cell.today{
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .day-cell.locked svg{ width:13px; height:13px; stroke:#a39d90; }
  .day-cell.viewed::after{
    content:'';
    position:absolute; top:4px; right:4px;
    width:5px; height:5px; border-radius:50%;
    background: currentColor;
    opacity:0.5;
  }

  #content-panel{ display:none; }
  #content-panel.visible{
    display:flex;
    position:fixed;
    inset:0;
    z-index: 50;
    align-items:flex-end;
    justify-content:center;
    background: rgba(20,16,12,0);
    backdrop-filter: blur(0px);
    animation: overlay-in 0.4s ease forwards;
  }
  @keyframes overlay-in{
    to{ background: rgba(20,16,12,0.55); backdrop-filter: blur(3px); }
  }

  .content-card{
    background: var(--card);
    border-radius: 26px 26px 0 0;
    padding: 10px 22px 32px;
    max-width: 460px;
    width:100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    animation: card-open 0.55s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 0.05s;
    position: relative;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
  }
  @media (min-width: 480px){
    #content-panel.visible{ align-items:center; }
    .content-card{
      border-radius: 22px;
      transform: scale(0.92) translateY(20px);
    }
    @keyframes card-open{
      to{ transform: scale(1) translateY(0); }
    }
  }
  @keyframes card-open{
    to{ transform: translateY(0); }
  }

  .drag-handle{
    width: 38px; height: 4px;
    background: var(--line);
    border-radius: 4px;
    margin: 10px auto 18px;
  }
  @media (min-width: 480px){ .drag-handle{ display:none; } }

  .close-card{
    position: absolute;
    top:16px; right:16px;
    width:30px; height:30px;
    border-radius:50%;
    background: var(--bg);
    border: 1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1;
    z-index: 5;
  }

  .reveal{
    opacity:0;
    animation: reveal-up 0.55s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes reveal-up{ from{opacity:0; transform:translateY(14px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);} }

  .content-tag{
    display:inline-flex; align-items:center; gap:6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .day-layout{
    display:flex;
    gap: 16px;
    align-items: flex-start;
  }
  .day-text{
    flex: 1.1;
    min-width: 0;
  }
  .day-photos{
    flex: 0.9;
    min-width: 0;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  @media (max-width: 360px){
    .day-layout{ flex-direction:column; }
    .day-photos{ flex-direction:row; }
  }

  .content-photo{
    width:100%;
    aspect-ratio: 3/4;
    border-radius: 12px;
    background: var(--locked);
    display:flex; align-items:center; justify-content:center;
    color: #a39d90;
    font-size: 12px;
    overflow:hidden;
  }
  .content-photo img{ width:100%; height:100%; object-fit:cover; cursor: zoom-in; }

  /* ---------- LIGHTBOX (agrandissement photo) ---------- */
  #lightbox{ display:none; }
  #lightbox.visible{
    display:flex;
    position:fixed; inset:0; z-index: 100;
    align-items:center; justify-content:center;
    padding: 24px;
    background: rgba(10,8,6,0.88);
    animation: overlay-in-lb 0.3s ease forwards;
  }
  @keyframes overlay-in-lb{ from{ opacity:0; } to{ opacity:1; } }
  .lightbox-inner{
    max-width: 520px; width:100%;
    display:flex; flex-direction:column; align-items:center;
    animation: lb-zoom 0.35s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes lb-zoom{ from{ transform: scale(0.92); opacity:0; } to{ transform: scale(1); opacity:1; } }
  .lightbox-inner img{
    width:100%; max-height: 75vh;
    object-fit: contain;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .lightbox-caption{
    color: #f3ede4;
    font-size: 13px;
    font-style: italic;
    text-align:center;
    margin-top: 14px;
    line-height: 1.5;
    max-width: 380px;
  }
  .lightbox-close{
    position: fixed;
    top:20px; right:20px;
    width:38px; height:38px;
    border-radius:50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 20px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index: 101;
  }

  /* ---------- WORD PUZZLE (glisser-deposer) ---------- */
  .puzzle-slots{
    display:flex; flex-wrap:wrap;
    gap: 8px;
    min-height: 46px;
    padding: 14px;
    border: 2px dashed var(--line);
    border-radius: 14px;
    background: var(--accent-soft);
    margin-bottom: 18px;
  }
  .puzzle-slots.empty::before{
    content: "depose les mots ici";
    color: var(--ink-soft);
    font-size: 13px;
    font-style: italic;
  }
  .puzzle-bank{
    display:flex; flex-wrap:wrap;
    gap: 8px;
    min-height: 46px;
  }
  .puzzle-word{
    padding: 9px 14px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 20px;
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink);
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }
  .puzzle-word:active{ cursor: grabbing; }
  .puzzle-word.dragging{
    opacity: 0.4;
  }
  .puzzle-word.drag-ghost{
    position: fixed;
    z-index: 200;
    pointer-events: none;
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    transform: scale(1.05) rotate(-2deg);
  }
  .puzzle-check{
    width:100%;
    margin-top: 6px;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-family: var(--serif);
    font-size: 15px;
    cursor: pointer;
  }
  .puzzle-check:disabled{ opacity: 0.4; cursor:not-allowed; }
  .puzzle-feedback{
    text-align:center;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 12px;
    min-height: 18px;
  }
  .puzzle-feedback.wrong{ color: #b5573f; }
  .puzzle-win-text{
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.6;
    color: var(--ink);
    text-align:center;
    padding: 20px 4px;
  }
  .memory-intro{
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .memory-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .memory-card{
    aspect-ratio: 3/4;
    perspective: 800px;
    cursor:pointer;
  }
  .memory-card-inner{
    position:relative;
    width:100%; height:100%;
    transition: transform 0.5s cubic-bezier(.16,1,.3,1);
    transform-style: preserve-3d;
  }
  .memory-card.flipped .memory-card-inner,
  .memory-card.matched .memory-card-inner{
    transform: rotateY(180deg);
  }
  .memory-card-face{
    position:absolute; inset:0;
    border-radius: 10px;
    backface-visibility: hidden;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .memory-card-front{
    background: var(--accent-soft);
    border: 1.5px solid var(--line);
  }
  .memory-card-front svg{ width:20px; height:20px; stroke: var(--accent); opacity:0.6; }
  .memory-card-back{
    background: var(--locked);
    transform: rotateY(180deg);
  }
  .memory-card-back img{ width:100%; height:100%; object-fit:cover; }
  .memory-card.matched{ opacity: 0.55; }
  .memory-progress{
    text-align:center;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 14px;
  }
  .memory-win-text{
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .memory-recap{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .memory-recap img{
    width:100%;
    aspect-ratio: 3/4;
    object-fit:cover;
    border-radius: 10px;
    cursor: zoom-in;
  }
  .photo-caption{
    font-size: 11px;
    color: var(--ink-soft);
    margin: 6px 0 0;
    font-style: italic;
    line-height: 1.4;
  }
  .content-text{
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
  }
  .content-text.placeholder{ color: var(--ink-soft); font-style: italic; font-family: var(--sans); font-size: 14px; }

  .empty-state{
    text-align:center;
    padding: 30px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }

  /* ---------- RAPPORT OFFICIEL MILITAIRE (jour 5) ---------- */
  .rapport-doc{
    background: #0f1a10;
    border-radius: 10px;
    padding: 18px 16px 20px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 11.5px;
    color: #b8c9a3;
    margin-top: 4px;
    line-height: 1.5;
  }
  .rapport-topbar{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid #2e4a20;
    padding-bottom: 10px;
    margin-bottom: 12px;
  }
  .rapport-logo{
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #5a7a45;
    line-height: 1.8;
  }
  .rapport-logo b{ color: #8ab870; display: block; font-size: 11px; }
  .rapport-stamp{
    border: 2px solid #c0392b;
    color: #c0392b;
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 8px;
    transform: rotate(-8deg);
    line-height: 1.4;
    text-align: center;
    flex-shrink: 0;
  }
  .rapport-ref-block{
    border: 1px solid #2e4a20;
    padding: 8px 10px;
    margin-bottom: 14px;
    background: #091209;
  }
  .rapport-ref-row{
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #5a7a45;
    margin-bottom: 2px;
  }
  .rapport-ref-row span{ color: #8ab870; }
  .rapport-objet{
    color: #d4e8b8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-left: 3px solid #5a7a45;
    padding: 6px 10px;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .rapport-section{ margin-bottom: 14px; }
  .rapport-section-title{
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #5a7a45;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rapport-section-title::before{
    content: '▸';
    color: #8ab870;
  }
  .rapport-section-title::after{
    content: '';
    flex: 1;
    height: 1px;
    background: #2e4a20;
  }
  .rapport-p{
    font-size: 11.5px;
    line-height: 1.7;
    color: #b8c9a3;
    margin-bottom: 6px;
  }
  .rapport-preuve{
    display: inline;
    color: #8ab870;
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    font-weight: 700;
  }
  .rapport-preuve:hover{ color: #d4e8b8; }
  .rapport-table{
    width: 100%;
    border-collapse: collapse;
    font-size: 10.5px;
    margin-bottom: 10px;
    font-family: 'Courier New', Courier, monospace;
  }
  .rapport-table th{
    background: #1a2e12;
    font-weight: 700;
    text-align: left;
    padding: 5px 7px;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #5a7a45;
    border: 1px solid #2e4a20;
  }
  .rapport-table td{
    padding: 5px 7px;
    border: 1px solid #1e3015;
    color: #b8c9a3;
  }
  .rapport-table .num{ text-align: right; font-variant-numeric: tabular-nums; }
  .rapport-table .highlight td{
    background: #1a2e12;
    color: #d4e8b8;
    font-weight: 700;
  }
  .rapport-table .highlight td.num{ color: #8ab870; }
  .rapport-classified{
    background: #091209;
    border: 1px solid #c0392b;
    padding: 12px 14px;
    border-radius: 4px;
    font-family: Georgia, serif;
    font-size: 13px;
    line-height: 1.75;
    color: #d4e8b8;
    font-style: italic;
    margin-top: 4px;
    position: relative;
  }
  .rapport-classified-label{
    font-family: 'Courier New', Courier, monospace;
    font-style: normal;
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c0392b;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rapport-classified-label::after{
    content: '';
    flex: 1;
    height: 1px;
    background: #c0392b;
    opacity: 0.4;
  }
  .rapport-sig{
    margin-top: 14px;
    text-align: right;
    font-size: 10px;
    color: #5a7a45;
    border-top: 1px solid #2e4a20;
    padding-top: 10px;
    font-style: italic;
  }
  .rapport-sig b{ color: #8ab870; font-style: normal; }

  footer{
    text-align:center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--ink-soft);
  }

  /* ---------- VELIB ---------- */
  .velib-question{
    margin-top: 22px;
    padding: 18px;
    background: var(--accent-soft);
    border-radius: 14px;
  }
  .velib-q-text{
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 14px;
    text-align: center;
  }
  .velib-btns{
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .velib-btn{
    padding: 11px 22px;
    border-radius: 22px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    font-family: var(--sans);
  }
  .velib-yes{
    background: var(--accent);
    color: #fff;
  }
  .velib-no{
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .velib-answered{
    font-family: var(--serif);
    font-size: 16px;
    color: var(--accent);
    text-align: center;
    font-style: italic;
  }
  .velib-videos{
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }
  .velib-video-btn{
    display: block;
    text-align: center;
    padding: 13px;
    border-radius: 12px;
    background: var(--ink);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
  }
  /* ---------- LEGO (jour 23) ---------- */
  .lego-image-wrap{
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    margin: 16px 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .lego-img{
    width: 100%;
    display: block;
    cursor: zoom-in;
    transition: transform 0.3s;
  }
  .lego-img:hover{ transform: scale(1.02); }
  .lego-3d-section{
    margin-top: 8px;
    margin-bottom: 16px;
  }
  .lego-3d-label{
    text-align: center;
    font-size: 14px;
    color: var(--ink);
    opacity: 0.6;
    margin-bottom: 10px;
    font-style: italic;
  }
  .lego-3d-wrap{
    position: relative;
    width: 100%;
    height: 340px;
    border-radius: 16px;
    overflow: hidden;
    background: #1a1218;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }
  #lego-canvas{
    width: 100% !important;
    height: 100% !important;
    display: block;
  }
  .lego-3d-hint{
    position: absolute;
    bottom: 10px;
    left: 50%;

function daysSinceStart(){
  const now = new Date();
  const start = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.floor((today - start) / 86400000) + 1;
  return diff;
}

function unlockedCount(){
  if (PREVIEW_MODE) return TOTAL_DAYS;
  const d = daysSinceStart();
  if (d < 1) return 0;
  if (d > TOTAL_DAYS) return TOTAL_DAYS;
  return d;
}

function buildGrid(){
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  const unlocked = unlockedCount();

  for(let i = 1; i <= TOTAL_DAYS; i++){
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.dataset.day = i;

    if(!PREVIEW_MODE && i === unlocked && i <= TOTAL_DAYS && unlocked > 0){
      cell.classList.add('today');
      cell.textContent = i;
    } else if(i <= unlocked){
      cell.classList.add('unlocked');
      cell.textContent = i;
    } else {
      cell.classList.add('locked');
      cell.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>';
    }

    if(i <= unlocked){
      cell.addEventListener('click', () => showDay(i));
    }
    grid.appendChild(cell);
  }

  const fillPct = Math.round((unlocked / TOTAL_DAYS) * 100);
  document.getElementById('progress-fill').style.width = fillPct + '%';

  let progressText;
  if(unlocked === 0){
    progressText = "Pas encore commence";
  } else if(unlocked >= TOTAL_DAYS){
    progressText = "<b>Les 46 jours</b> sont passes. On se retrouve.";
  } else {
    progressText = `<b>${unlocked}</b> jour${unlocked>1?'s':''} debloque${unlocked>1?'s':''}, <b>${TOTAL_DAYS-unlocked}</b> a venir`;
  }
  document.getElementById('progress-text').innerHTML = progressText;
}

function escapeAttr(str){
  return (str || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}

/* ---------- MEMORY GAME (avec sauvegarde) ---------- */
function initMemoryGame(data, dayNum){
  const pairs = data.pairs;
  const root = document.getElementById('memory-root');
  let saved = DayState.load(dayNum);
  let cards, matchedSet, state;

  if(saved && saved.type==='memory' && saved.cardOrder){
    cards = saved.cardOrder.map(o=>({ pairId:o.pairId, src:pairs[o.pairId].src, caption:pairs[o.pairId].caption }));
    matchedSet = new Set(saved.matched||[]);
    state = saved.state||'playing';
  } else {
    let base=[];
    pairs.forEach((p,i)=>{ base.push({pairId:i,src:p.src,caption:p.caption}); base.push({pairId:i,src:p.src,caption:p.caption}); });
    for(let i=base.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [base[i],base[j]]=[base[j],base[i]]; }
    cards=base; matchedSet=new Set(); state='playing';
    DayState.save(dayNum,{type:'memory',cardOrder:cards.map(c=>({pairId:c.pairId})),matched:[],state:'playing'});
  }

  if(state==='won'){ showMemoryWin(data,dayNum); return; }

  let flipped=[], lock=false, matchedCount=matchedSet.size/2;
  root.innerHTML=`<div class="memory-grid" id="memory-grid"></div><div class="memory-progress" id="memory-progress">${matchedCount} / ${pairs.length} paires trouvées</div>`;
  const grid=document.getElementById('memory-grid');

  cards.forEach((c,idx)=>{
    const cardEl=document.createElement('div');
    cardEl.className='memory-card';
    if(matchedSet.has(idx)) cardEl.classList.add('matched','flipped');
    cardEl.innerHTML=`<div class="memory-card-inner"><div class="memory-card-face memory-card-front"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21c-4.97-3.2-9-7.5-9-11.3C3 6.5 5.2 4.5 7.8 4.5c1.8 0 3.3 1 4.2 2.4.9-1.4 2.4-2.4 4.2-2.4C18.8 4.5 21 6.5 21 9.7c0 3.8-4.03 8.1-9 11.3z"/></svg></div><div class="memory-card-face memory-card-back"><img src="${c.src}" alt="" class="lightbox-trigger" data-src="${escapeAttr(c.src)}" data-caption="${escapeAttr(c.caption||'')}"></div></div>`;
    cardEl.addEventListener('click',()=>flipCard(idx,cardEl));
    grid.appendChild(cardEl);
  });

  function saveNow(){ DayState.save(dayNum,{type:'memory',cardOrder:cards.map(c=>({pairId:c.pairId})),matched:[...matchedSet],state:matchedCount===pairs.length?'won':'playing'}); }

  function flipCard(idx,cardEl){
    if(lock||cardEl.classList.contains('flipped')||cardEl.classList.contains('matched')||flipped.length===2) return;
    cardEl.classList.add('flipped');
    flipped.push({idx,cardEl,pairId:cards[idx].pairId});
    if(flipped.length===2){
      lock=true;
      const [a,b]=flipped;
      if(a.pairId===b.pairId){
        setTimeout(()=>{
          a.cardEl.classList.add('matched'); b.cardEl.classList.add('matched');
          matchedSet.add(a.idx); matchedSet.add(b.idx); matchedCount++;
          document.getElementById('memory-progress').textContent=`${matchedCount} / ${pairs.length} paires trouvées`;
          flipped=[]; lock=false; saveNow();
          if(matchedCount===pairs.length){ DayState.save(dayNum,{type:'memory',cardOrder:cards.map(c=>({pairId:c.pairId})),matched:[...matchedSet],state:'won'}); setTimeout(()=>showMemoryWin(data,dayNum),500); }
        },350);
      } else {
        setTimeout(()=>{
          a.cardEl.classList.add('wrong'); b.cardEl.classList.add('wrong');
          setTimeout(()=>{ a.cardEl.classList.remove('flipped','wrong'); b.cardEl.classList.remove('flipped','wrong'); flipped=[]; lock=false; },450);
        },600);
      }
    }
  }
}

function showMemoryWin(data, dayNum){
  const card=document.getElementById('content-card');
  let delay=0; const step=0.1;
  const recapHtml=data.pairs.map(p=>{ delay+=step; return `<img src="${p.src}" alt="" class="reveal lightbox-trigger" style="animation-delay:${delay}s;" data-src="${escapeAttr(p.src)}" data-caption="${escapeAttr(p.caption||'')}">`;}).join('');
  delay+=step;
  card.innerHTML=`<div class="drag-handle"></div><div class="close-card" onclick="closeDay()">&times;</div><div class="content-tag reveal" style="animation-delay:0s;">${TAG_LABELS.minigame}</div><div class="memory-win-text reveal" style="animation-delay:0.08s;">${data.winText||data.text}</div><div class="memory-recap">${recapHtml}</div><button class="btn-restart reveal" style="animation-delay:${delay}s;" onclick="restartDay(${dayNum},'memory')">Recommencer ↺</button>`;
}

/* ---------- WORD PUZZLE (avec sauvegarde) ---------- */
function initWordPuzzle(data, dayNum){
  const target=data.words;
  const root=document.getElementById('puzzle-root');
  let saved=DayState.load(dayNum);
  let shuffled, slotsWords, bankWords, state;

  if(saved&&saved.type==='puzzle'&&saved.bankOrder){
    shuffled=saved.shuffledOrder; slotsWords=saved.slotsOrder||[]; bankWords=saved.bankOrder; state=saved.state||'playing';
  } else {
    do { shuffled=[...target]; for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; } } while(shuffled.join(' ')===target.join(' '));
    slotsWords=[]; bankWords=[...shuffled]; state='playing';
    DayState.save(dayNum,{type:'puzzle',shuffledOrder:shuffled,slotsOrder:[],bankOrder:[...shuffled],state:'playing'});
  }

  if(state==='won'){ showPuzzleWin(data,dayNum); return; }

  root.innerHTML=`<div class="puzzle-slots ${slotsWords.length===0?'empty':''}" id="puzzle-slots"></div><div class="puzzle-bank" id="puzzle-bank"></div><button class="puzzle-check" id="puzzle-check" disabled>Vérifier</button><div class="puzzle-feedback" id="puzzle-feedback"></div>`;
  const slotsEl=document.getElementById('puzzle-slots');
  const bankEl=document.getElementById('puzzle-bank');
  const checkBtn=document.getElementById('puzzle-check');
  const feedbackEl=document.getElementById('puzzle-feedback');

  function makeWordEl(word,uid){ const el=document.createElement('div'); el.className='puzzle-word'; el.textContent=word; el.dataset.word=word; el.dataset.uid=uid; return el; }
  function saveState(){ DayState.save(dayNum,{type:'puzzle',shuffledOrder:shuffled,slotsOrder:[...slotsEl.children].map(e=>e.dataset.word),bankOrder:[...bankEl.children].map(e=>e.dataset.word),state:'playing'}); }
  function updateState(){ slotsEl.classList.toggle('empty',slotsEl.children.length===0); checkBtn.disabled=bankEl.children.length!==0; saveState(); }

  slotsWords.forEach((w,i)=>{ const el=makeWordEl(w,'s'+i); slotsEl.appendChild(el); makeDraggable(el); });
  bankWords.forEach((w,i)=>{ const el=makeWordEl(w,'b'+i); bankEl.appendChild(el); makeDraggable(el); });
  updateState();

  function makeDraggable(el){
    let dragging=false, ghost=null;
    function getDropTarget(x,y){ el.style.pointerEvents='none'; const u=document.elementFromPoint(x,y); el.style.pointerEvents=''; if(!u) return null; return u.closest('.puzzle-slots,.puzzle-bank'); }
    function onMove(cx,cy){ if(!dragging) return; ghost.style.left=(cx-ghost.offsetWidth/2)+'px'; ghost.style.top=(cy-ghost.offsetHeight/2)+'px'; }
    function onEnd(cx,cy){ if(!dragging) return; dragging=false; el.classList.remove('dragging'); ghost.remove(); ghost=null; const dz=getDropTarget(cx,cy); if(dz) dz.appendChild(el); feedbackEl.textContent=''; feedbackEl.classList.remove('wrong'); updateState(); document.removeEventListener('mousemove',mmH); document.removeEventListener('mouseup',muH); document.removeEventListener('touchmove',tmH); document.removeEventListener('touchend',teH); }
    function mmH(e){ onMove(e.clientX,e.clientY); }
    function muH(e){ onEnd(e.clientX,e.clientY); }
    function tmH(e){ onMove(e.touches[0].clientX,e.touches[0].clientY); e.preventDefault(); }
    function teH(e){ onEnd(e.changedTouches[0].clientX,e.changedTouches[0].clientY); }
    function startDrag(cx,cy){ dragging=true; el.classList.add('dragging'); ghost=el.cloneNode(true); ghost.classList.add('drag-ghost'); ghost.classList.remove('dragging'); ghost.style.width=el.offsetWidth+'px'; document.body.appendChild(ghost); onMove(cx,cy); }
    el.addEventListener('mousedown',e=>{ e.preventDefault(); startDrag(e.clientX,e.clientY); document.addEventListener('mousemove',mmH); document.addEventListener('mouseup',muH); });
    el.addEventListener('touchstart',e=>{ const t=e.touches[0]; startDrag(t.clientX,t.clientY); document.addEventListener('touchmove',tmH,{passive:false}); document.addEventListener('touchend',teH); },{passive:true});
  }

  checkBtn.addEventListener('click',()=>{
    const order=[...slotsEl.children].map(e=>e.dataset.word);
    if(order.join(' ')===target.join(' ')){ DayState.save(dayNum,{type:'puzzle',shuffledOrder:shuffled,slotsOrder:order,bankOrder:[],state:'won'}); setTimeout(()=>showPuzzleWin(data,dayNum),300); }
    else { feedbackEl.textContent="Pas tout à fait... réessaie."; feedbackEl.classList.add('wrong'); }
  });
}

/* ---------- LEGO 3D (jour 23) ---------- */
function initLego3D(glbPath) {
  const wrap = document.getElementById('lego-3d-wrap');
  const canvas = document.getElementById('lego-canvas');
  if (!wrap || !canvas) return;

  // Charger Three.js + GLTFLoader dynamiquement
  function loadScript(src, cb) {
    const s = document.createElement('script');
    s.src = src;
    s.onload = cb;
    document.head.appendChild(s);
  }

  loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js', function() {
    loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js', function() {
      const W = wrap.clientWidth, H = wrap.clientHeight;

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      renderer.outputEncoding = THREE.sRGBEncoding;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1218);
      scene.fog = new THREE.Fog(0x1a1218, 15, 30);

      const camera = new THREE.PerspectiveCamera(40, W / H, 0.01, 100);
      camera.position.set(0, 0.5, 2.5);

      // Lumières
      const amb = new THREE.AmbientLight(0xfff5ee, 1.2);
      scene.add(amb);
      const key = new THREE.DirectionalLight(0xffffff, 2.5);
      key.position.set(2, 4, 3);
      key.castShadow = true;
      scene.add(key);
      const fill = new THREE.DirectionalLight(0xaaddff, 0.8);
      fill.position.set(-3, 2, 1);
      scene.add(fill);
      const rim = new THREE.DirectionalLight(0xffccaa, 0.6);
      rim.position.set(0, -1, -3);
      scene.add(rim);

      // Charger le GLB
      const loader = new THREE.GLTFLoader();
      loader.load(glbPath, function(gltf) {
        const model = gltf.scene;

        // Centrer et redimensionner
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.8 / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        model.position.y -= size.y * scale * 0.3;

        scene.add(model);

        // Orbit controls manuels
        let isDragging = false, prevX = 0, prevY = 0;
        let theta = 0, phi = 0.15, radius = 2.5;
        const target = new THREE.Vector3(0, 0, 0);

        function updateCam() {
          camera.position.set(
            target.x + radius * Math.sin(theta) * Math.cos(phi),
            target.y + radius * Math.sin(phi),
            target.z + radius * Math.cos(theta) * Math.cos(phi)
          );
          camera.lookAt(target);
        }
        updateCam();

        canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mousemove', e => {
          if (!isDragging) return;
          theta -= (e.clientX - prevX) * 0.01;
          phi = Math.max(-0.3, Math.min(0.7, phi + (e.clientY - prevY) * 0.006));
          prevX = e.clientX; prevY = e.clientY;
          updateCam();
        });
        canvas.addEventListener('wheel', e => {
          radius = Math.max(1.2, Math.min(5, radius + e.deltaY * 0.003));
          updateCam(); e.preventDefault();
        }, { passive: false });

        let lastTX = 0, lastTY = 0;
        canvas.addEventListener('touchstart', e => { lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY; });
        canvas.addEventListener('touchmove', e => {
          theta -= (e.touches[0].clientX - lastTX) * 0.012;
          phi = Math.max(-0.3, Math.min(0.7, phi + (e.touches[0].clientY - lastTY) * 0.007));
          lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY;
          updateCam(); e.preventDefault();
        }, { passive: false });

        // Rotation auto douce
        let autoRotate = true;
        canvas.addEventListener('mousedown', () => autoRotate = false);
        canvas.addEventListener('touchstart', () => autoRotate = false);

        // Masquer le hint après interaction
        const hint = wrap.querySelector('.lego-3d-hint');
        canvas.addEventListener('mousedown', () => { if (hint) hint.style.opacity = '0'; });

        function animate() {
          requestAnimationFrame(animate);
          if (autoRotate) { theta += 0.005; updateCam(); }
          renderer.render(scene, camera);
        }
        animate();

      }, undefined, function(err) {
        console.error('GLB load error', err);
        wrap.innerHTML = '<p style="color:#fff;text-align:center;padding:40px;opacity:0.5;">Modèle 3D non disponible</p>';
      });
    });
  });
}

  function animCount(el, target, duration){
    const start = performance.now();
    function step(now){
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(ease * target).toLocaleString('fr-FR');
      if(t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

function initDatesQuiz(data, dayNum){
  const root=document.getElementById('datesquiz-root');
  if(!root) return;
  const questions=data.questions;
  let saved=DayState.load(dayNum);
  let answers, current, state;
  if(saved&&saved.type==='datesquiz'){ answers=saved.answers||[]; current=saved.current||0; state=saved.state||'playing'; }
  else { answers=[]; current=0; state='playing'; DayState.save(dayNum,{type:'datesquiz',answers:[],current:0,state:'playing'}); }
  if(state==='won'||current>=questions.length){ renderDatesResult(data,answers,dayNum); return; }

  const MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

  function parseInput(raw){
    const s=raw.trim().toLowerCase().replace(/\//g,'-').replace(/\s+/g,' ').replace(/1er/,'1');
    let m=s.match(/^(\d{1,2})[-\/](\d{1,2})$/);
    if(m) return {day:parseInt(m[1]),month:parseInt(m[2])};
    for(let i=0;i<MOIS.length;i++){
      const re=new RegExp('(\\d{1,2})\\s*'+MOIS[i].substring(0,4));
      const match=s.match(re);
      if(match) return {day:parseInt(match[1]),month:i+1};
    }
    return null;
  }

  function checkAnswer(parsed,q){
    if(!parsed) return false;
    const targets=Array.isArray(q.answer)?q.answer:[q.answer];
    return targets.some(t=>t.day===parsed.day&&t.month===parsed.month);
  }

  function saveState(){ DayState.save(dayNum,{type:'datesquiz',answers,current,state:current>=questions.length?'won':'playing'}); }

  function renderQuestion(){
    if(current>=questions.length){ saveState(); renderDatesResult(data,answers,dayNum); return; }
    const q=questions[current];
    root.innerHTML=`<div class="dq-progress">${current+1} / ${questions.length}</div><div class="dq-question">${q.question}</div><div style="display:flex;gap:8px;margin-bottom:10px;"><input id="dq-day" class="dq-input" style="width:70px;" type="number" placeholder="Jour" min="1" max="31"><input id="dq-month" class="dq-input" style="flex:1;" type="number" placeholder="Mois" min="1" max="12"></div><button class="dq-btn" id="dq-btn">Valider</button><div class="dq-feedback" id="dq-feedback"></div>`;
    const dayIn=document.getElementById('dq-day'),monthIn=document.getElementById('dq-month'),btn=document.getElementById('dq-btn'),fb=document.getElementById('dq-feedback');
    btn.addEventListener('click',()=>{
      const d=parseInt(dayIn.value)||0,m=parseInt(monthIn.value)||0;
      const targets=Array.isArray(q.answer)?q.answer:[q.answer];
      const correct=targets.some(t=>t.day===d&&t.month===m);
      answers.push({given:{day:d,month:m},correct}); saveState();
      fb.textContent=correct?'✓ Bonne réponse !':(q.taquin||'Pas exactement...');
      fb.className='dq-feedback '+(correct?'dq-ok':'dq-wrong');
      btn.disabled=true;
      setTimeout(()=>{ current++; saveState(); renderQuestion(); },1800);
    });
    [dayIn,monthIn].forEach(inp=>inp.addEventListener('keydown',e=>{ if(e.key==='Enter') btn.click(); }));
  }

  renderQuestion();

  if(!document.getElementById('dq-style')){
    const s=document.createElement('style'); s.id='dq-style';
    s.textContent=`#datesquiz-root{margin-top:22px;}.dq-progress{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-soft);margin-bottom:14px;}.dq-question{font-family:var(--serif);font-size:17px;line-height:1.6;color:var(--ink);margin-bottom:16px;}.dq-input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);font-size:16px;color:var(--ink);font-family:var(--sans);margin-bottom:10px;text-align:center;}.dq-input:focus{outline:none;border-color:var(--accent);}.dq-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;cursor:pointer;margin-bottom:10px;}.dq-btn:disabled{opacity:0.4;cursor:not-allowed;}.dq-feedback{font-size:13px;line-height:1.5;min-height:20px;color:var(--ink-soft);font-style:italic;}.dq-feedback.dq-ok{color:#4a8c5c;font-style:normal;font-weight:600;}.dq-feedback.dq-wrong{color:var(--accent);}.dq-result{text-align:center;padding:20px 0 10px;}.dq-score{font-size:64px;font-weight:800;color:var(--accent);font-family:var(--sans);line-height:1;}.dq-score span{font-size:28px;color:var(--ink-soft);}.dq-result-msg{font-family:var(--serif);font-size:18px;line-height:1.6;color:var(--ink);margin:16px 0 8px;}.dq-result-sub{font-size:13px;color:var(--ink-soft);}`;
    document.head.appendChild(s);
  }
}

function renderDatesResult(data, answers, dayNum){
  const root=document.getElementById('datesquiz-root');
  if(!root) return;
  const score=answers.filter(a=>a.correct).length,total=answers.length;
  let msg;
  if(score===total) msg="Parfait. T'as tout juste. Je t'aime encore plus là.";
  else if(score>=total*0.7) msg="Pas mal du tout. Y'a quelques trous mais t'as retenu l'essentiel.";
  else if(score>=total*0.4) msg="Bof bof... on repassera les dates ensemble un jour.";
  else msg="Aziyadé... t'as oublié nos dates. Je suis blessé. (non je rigole je t'aime)";
  root.innerHTML=`<div class="dq-result"><div class="dq-score">${score}<span>/${total}</span></div><div class="dq-result-msg">${msg}</div><div class="dq-result-sub">Joyeux 6 mois ❤️</div></div><button class="btn-restart" onclick="restartDay(${dayNum},'datesquiz')">Recommencer ↺</button>`;
}

/* ============================================================
   DayState — sauvegarde localStorage
   ============================================================ */
const DayState = {
  save(day, data){ try{ localStorage.setItem('day_'+day, JSON.stringify(data)); }catch(e){} },
  load(day){ try{ const v=localStorage.getItem('day_'+day); return v?JSON.parse(v):null; }catch(e){ return null; } },
  clear(day){ try{ localStorage.removeItem('day_'+day); }catch(e){} }
};

function restartDay(dayNum, gameType){
  DayState.clear(dayNum);
  const data=CONTENT[dayNum];
  if(!data) return;
  const card=document.getElementById('content-card');
  if(gameType==='memory'){
    card.innerHTML=`<div class="drag-handle"></div><div class="close-card" onclick="closeDay()">&times;</div><div class="content-tag">${TAG_LABELS.minigame}</div><div class="memory-intro">${data.text}</div><div id="memory-root"></div>`;
    initMemoryGame(data,dayNum);
  } else if(gameType==='puzzle'){
    card.innerHTML=`<div class="drag-handle"></div><div class="close-card" onclick="closeDay()">&times;</div><div class="content-tag">${TAG_LABELS.wordpuzzle}</div><div class="memory-intro">${data.text}</div><div id="puzzle-root"></div>`;
    initWordPuzzle(data,dayNum);
  } else if(gameType==='datesquiz'){
    card.innerHTML=`<div class="drag-handle"></div><div class="close-card" onclick="closeDay()">&times;</div><div class="content-tag">Petit quiz</div><div class="content-text">${data.intro}</div><div id="datesquiz-root" class="reveal"></div>`;
    initDatesQuiz(data,dayNum);
  }
}

/* Wrapped : sauvegarde slide courante */
const _origInitWrapped = initWrapped;
function initWrapped(data, dayNum){
  _origInitWrapped(data);
  const saved=DayState.load(dayNum);
  const startSlide=(saved&&saved.type==='wrapped')?(saved.slide||0):0;
  setTimeout(()=>{
    if(startSlide>0){ const btn=document.getElementById('w-tap-next'); for(let i=0;i<startSlide;i++) if(btn) btn.click(); }
    ['w-tap-next','w-tap-prev'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.addEventListener('click',()=>{
        const active=document.querySelector('.wrapped-slide.active');
        if(active){ DayState.save(dayNum,{type:'wrapped',slide:parseInt(active.id.replace('w-slide-',''))||0}); }
      });
    });
  },300);
}
